<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <style>
        :root {
            --bg-body: #1a1a2e;
            --bg-calc: rgba(20, 20, 40, 0.85);
            --bg-display: rgba(30, 30, 60, 0.6);
            --text-primary: #ffffff;
            --text-display: #ffffff;
            --btn-number-bg: linear-gradient(135deg, #2e2e54, #1f1f3a);
            --btn-number-color: #ffffff;
            --btn-number-shadow: 0 4px 15px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.1);
            --btn-operator-bg: linear-gradient(135deg, #ff6b6b, #ee5253);
            --btn-operator-color: #ffffff;
            --btn-operator-shadow: 0 4px 15px rgba(238,82,83,0.4);
            --btn-clear-bg: linear-gradient(135deg, #feca57, #ff9f43);
            --btn-clear-color: #ffffff;
            --btn-clear-shadow: 0 4px 15px rgba(255,159,67,0.4);
            --btn-equal-bg: linear-gradient(135deg, #1dd1a1, #10ac84);
            --btn-equal-color: #ffffff;
            --btn-equal-shadow: 0 4px 15px rgba(16,172,132,0.4);
            --btn-hover-opacity: 0.9;
            --btn-active-scale: 0.95;
            --neon-glow: 0 0 15px rgba(29, 209, 161, 0.5);
        }

        [data-theme="light"] {
            --bg-body: #f5f6fa;
            --bg-calc: #ffffff;
            --bg-display: #f1f2f6;
            --text-primary: #2f3640;
            --text-display: #2f3640;
            --btn-number-bg: linear-gradient(135deg, #ffffff, #f1f2f6);
            --btn-number-color: #2f3640;
            --btn-number-shadow: 0 4px 10px rgba(0,0,0,0.05), inset 0 1px 0 #ffffff;
            --btn-operator-bg: linear-gradient(135deg, #ff7675, #d63031);
            --btn-operator-shadow: 0 4px 10px rgba(214,48,49,0.2);
            --btn-clear-bg: linear-gradient(135deg, #ffeaa7, #fdcb6e);
            --btn-clear-shadow: 0 4px 10px rgba(253,203,110,0.2);
            --btn-equal-bg: linear-gradient(135deg, #55efc4, #00b894);
            --btn-equal-shadow: 0 4px 10px rgba(0,184,148,0.2);
            --neon-glow: 0 4px 10px rgba(0,184,148,0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-body);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s ease;
            overflow: hidden;
            padding: 20px;
        }

        .calculator {
            background: var(--bg-calc);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 380px;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            transition: background 0.3s ease, transform 0.1s ease;
        }

        .calculator.error-shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-display);
            box-shadow: var(--btn-number-shadow);
            transition: background-color 0.3s ease;
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            fill: var(--text-primary);
            transition: transform 0.5s ease;
        }

        .theme-toggle:active svg {
            transform: rotate(45deg);
        }

        .display-container {
            background: var(--bg-display);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
            text-align: right;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            word-wrap: break-word;
            word-break: break-all;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .history {
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 5px;
            min-height: 20px;
            font-weight: 300;
        }
        [data-theme="light"] .history {
            color: rgba(0,0,0,0.4);
        }

        .current-input {
            font-size: 36px;
            font-weight: 400;
            color: var(--text-display);
            line-height: 1.2;
            transition: font-size 0.1s ease;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        .btn {
            border: none;
            outline: none;
            border-radius: 18px;
            font-size: 22px;
            font-weight: 500;
            height: 65px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(var(--btn-active-scale));
        }

        .btn-number {
            background: var(--btn-number-bg);
            color: var(--btn-number-color);
            box-shadow: var(--btn-number-shadow);
        }

        .btn-operator {
            background: var(--btn-operator-bg);
            color: var(--btn-operator-color);
            box-shadow: var(--btn-operator-shadow);
            font-weight: 600;
        }

        .btn-clear {
            background: var(--btn-clear-bg);
            color: var(--btn-clear-color);
            box-shadow: var(--btn-clear-shadow);
        }

        .btn-equal {
            background: var(--btn-equal-bg);
            color: var(--btn-equal-color);
            box-shadow: var(--btn-equal-shadow);
            grid-column: span 2;
            box-shadow: var(--neon-glow), var(--btn-equal-shadow);
        }

        @media (max-width: 350px) {
            .grid { gap: 10px; }
            .btn { height: 55px; font-size: 20px; }
            .current-input { font-size: 30px; }
        }
    </style>
</head>
<body>

    <div class="calculator" id="calcCard">
        <div class="header-controls">
            <div style="color: var(--text-primary); font-size: 12px; letter-spacing: 1px; font-weight: 600; opacity: 0.7;">CALCULATOR</div>
            <button class="theme-toggle" id="themeBtn" aria-label="Смена темы">
                <svg id="themeIcon" viewBox="0 0 24 24">
                    <path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-8.9 8.2-9.8.5-.1 1 .3.9.8-.1.5-.6.9-1.1.8-3.7.4-6.4 3.6-6.4 7.4 0 4.1 3.4 7.5 7.5 7.5 3.8 0 7-2.7 7.4-6.4-.1-.5.3-1 .8-1.1.5-.1.9.2.8.7-.9 4.7-5 8.2-9.8 8.1z"/>
                </svg>
            </button>
        </div>

        <div class="display-container">
            <div class="history" id="historyView"></div>
            <div class="current-input" id="display">0</div>
        </div>

        <div class="grid">
            <button class="btn btn-clear" data-action="clear">AC</button>
            <button class="btn btn-clear" data-action="backspace">⌫</button>
            <button class="btn btn-operator" data-val="(">(</button>
            <button class="btn btn-operator" data-val=")">)</button>

            <button class="btn btn-number" data-val="7">7</button>
            <button class="btn btn-number" data-val="8">8</button>
            <button class="btn btn-number" data-val="9">9</button>
            <button class="btn btn-operator" data-val="/">÷</button>

            <button class="btn btn-number" data-val="4">4</button>
            <button class="btn btn-number" data-val="5">5</button>
            <button class="btn btn-number" data-val="6">6</button>
            <button class="btn btn-operator" data-val="*">×</button>

            <button class="btn btn-number" data-val="1">1</button>
            <button class="btn btn-number" data-val="2">2</button>
            <button class="btn btn-number" data-val="3">3</button>
            <button class="btn btn-operator" data-val="-">−</button>

            <button class="btn btn-number" data-val="0">0</button>
            <button class="btn btn-number" data-val=".">.</button>
            <button class="btn btn-equal" data-action="calculate">=</button>
            <button class="btn btn-operator" data-val="+">+</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const historyView = document.getElementById('historyView');
        const calcCard = document.getElementById('calcCard');
        const themeBtn = document.getElementById('themeBtn');
        const themeIcon = document.getElementById('themeIcon');
        
        let expr = '';
        let isEvaluated = false;

        // Переключение темы (Светлая / Темная)
        themeBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'light') {
                document.documentElement.removeAttribute('data-theme');
                themeIcon.innerHTML = `<path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-8.9 8.2-9.8.5-.1 1 .3.9.8-.1.5-.6.9-1.1.8-3.7.4-6.4 3.6-6.4 7.4 0 4.1 3.4 7.5 7.5 7.5 3.8 0 7-2.7 7.4-6.4-.1-.5.3-1 .8-1.1.5-.1.9.2.8.7-.9 4.7-5 8.2-9.8 8.1z"/>`;
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                themeIcon.innerHTML = `<path d="M12 7c-2.8 0-5 2.2-5 5s2.2 5 5 5 5-2.2 5-5-2.2-5-5-5zM2 13h2c.6 0 1-.4 1-1s-.4-1-1-1H2c-.6 0-1 .4-1 1s.4 1 1 1zm18 0h2c.6 0 1-.4 1-1s-.4-1-1-1h-2c-.6 0-1 .4-1 1s.4 1 1 1zM11 2v2c0 .6.4 1 1 1s1-.4 1-1V2c0-.6-.4-1-1-1s-1 .4-1 1zm0 18v2c0 .6.4 1 1 1s1-.4 1-1v-2c0-.6-.4-1-1-1s-1 .4-1 1zM5.9 4.5c-.4-.4-1-.4-1.4 0s-.4 1 0 1.4l1.4 1.4c.4.4 1 .4 1.4 0s.4-1 0-1.4L5.9 4.5zm12.2 12.2c-.4-.4-1-.4-1.4 0s-.4 1 0 1.4l1.4 1.4c.4.4 1 .4 1.4 0s.4-1 0-1.4l-1.4-1.4zM7.3 16.7l-1.4 1.4c-.4.4-.4 1 0 1.4s1 .4 1.4 0l1.4-1.4c.4-.4.4-1 0-1.4s-1-.4-1.4 0zm12.2-12.2l-1.4 1.4c-.4.4-.4 1 0 1.4s1 .4 1.4 0l1.4-1.4c.4-.4.4-1 0-1.4s-1-.4-1.4 0z"/>`;
            }
        });

        // Обработка кликов по кнопкам
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const val = btn.getAttribute('data-val');
                const action = btn.getAttribute('data-action');

                if (val) handleInput(val);
                else if (action) handleAction(action);
                
                updateFontSize();
            });
        });

        function handleInput(char) {
            if (isEvaluated) {
                // Если число вводится сразу после вычислений — начинаем заново
                if (!['+', '-', '*', '/', '.'].includes(char)) {
                    expr = '';
                }
                isEvaluated = false;
            }

            const lastChar = expr.slice(-1);

            // Защита от дублирования операторов и точек
            if (['+', '-', '*', '/'].includes(char) && ['+', '-', '*', '/', '('].includes(lastChar)) {
                if (char === '-' && lastChar !== '-') {
                    // Разрешаем унарный минус после знаков или скобок
                } else {
                    return; 
                }
            }

            if (char === '.') {
                const parts = expr.split(/[\+\-\*\/\(\)]/);
                const currentPart = parts[parts.length - 1];
                if (currentPart.includes('.')) return; // В одном числе не может быть две точки
                if (expr === '' || ['+', '-', '*', '/', '('].includes(lastChar)) {
                    expr += '0';
                }
            }

            expr += char;
            renderDisplay(expr);
        }

        function handleAction(action) {
            if (action === 'clear') {
                expr = '';
                isEvaluated = false;
                renderDisplay('0');
                historyView.innerText = '';
            } else if (action === 'backspace') {
                if (isEvaluated) {
                    historyView.innerText = '';
                    isEvaluated = false;
                }
                expr = expr.slice(0, -1);
                renderDisplay(expr || '0');
            } else if (action === 'calculate') {
                if (!expr) return;
                
                let processedExpr = expr;
                
                // Автоматическое исправление: убираем висящие операторы на конце перед расчетом
                while (['+', '-', '*', '/', '.'].includes(processedExpr.slice(-1))) {
                    processedExpr = processedExpr.slice(0, -1);
                }

                // Автоматическое закрытие непарных скобок
                const openBrackets = (processedExpr.match(/\(/g) || []).length;
                const closeBrackets = (processedExpr.match(/\)/g) || []).length;
                if (openBrackets > closeBrackets) {
                    processedExpr += ')'.repeat(openBrackets - closeBrackets);
                }

                try {
                    // Безопасное вычисление базовых математических выражений
                    const result = new Function(`return (${processedExpr})`)();
                    
                    if (result === Infinity || result === -Infinity || isNaN(result)) {
                        throw new Error();
                    }

                    historyView.innerText = processedExpr.replace(/\*/g, '×').replace(/\//g, '÷') + ' =';
                    
                    // Округляем до 8 знаков, чтобы не лезли хвосты типа 0.0000000001
                    expr = String(Number(result.toFixed(8))); 
                    renderDisplay(expr);
                    isEvaluated = true;
                } catch (e) {
                    triggerError();
                }
            }
        }

        function renderDisplay(text) {
            // Форматируем для красивого отображения знаков умножения и деления
            display.innerText = text.replace(/\*/g, '×').replace(/\//g, '÷');
        }

        function triggerError() {
            calcCard.classList.add('error-shake');
            display.innerText = 'Ошибка';
            display.style.color = '#ff6b6b';
            setTimeout(() => {
                calcCard.classList.remove('error-shake');
                display.style.color = 'var(--text-display)';
                renderDisplay(expr || '0');
            }, 500);
        }

        function updateFontSize() {
            const len = display.innerText.length;
            if (len > 12) display.style.fontSize = '22px';
            else if (len > 8) display.style.fontSize = '28px';
            else display.style.fontSize = '36px';
        }
    </script>
</body>
</html>
